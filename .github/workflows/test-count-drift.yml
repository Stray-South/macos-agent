name: Test count drift check

# Unit 12 (Path B) — first CI workflow for this repo.
# Runs `swift test` and verifies that PHASES.md + MANIFEST.md cite the
# same test count. Catches the doc-drift problem that bit us 4 times
# during the H3 chain (Units 5–11, 2026-05-26 → 2026-05-27).
#
# Cost: ~60-90s macOS runner per fire. At $0.08/min × ~30 pushes/mo,
# under the $5/mo Actions cap noted in project memory. Tests double as
# the generic CI gate — if a future commit breaks the build or a test,
# this workflow catches that too.

# Quoted "on" — bare `on:` parses as YAML 1.1 boolean True in PyYAML and
# similar strict linters. GitHub Actions handles either form correctly.
"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a newer commit lands.
# Saves Actions minutes when iterating on a PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-verify-doc-counts:
    name: swift test + PHASES/MANIFEST count check
    runs-on: macos-latest
    timeout-minutes: 15
    # Reviewer-flagged Sev-2 (Unit 12 adversarial pass): explicit
    # least-privilege permissions block. Sets the template for future
    # workflows in this repo. Read-only GITHUB_TOKEN is sufficient — this
    # workflow only checks out + runs tests + greps docs.
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        # macos-latest default Xcode ships Swift 6.1; Package.swift declares
        # swift-tools-version: 6.2 (locally we run Swift 6.3.1). Pinning
        # latest-stable Xcode picks whichever 16.3+ image is pre-installed
        # on the runner — currently the only path to Swift 6.2 on hosted
        # macOS runners. Caught by the first CI run on Unit 12 (commit
        # 22a0be2): "package 'macos-agent-v0' is using Swift tools version
        # 6.2.0 but the installed version is 6.1.0".
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SPM build artifacts
        # Reviewer-flagged Sev-1 (Unit 12 adversarial pass): cold SPM build
        # on macos-latest with 407 tests takes ~3-5 min. At $0.08/min × 30
        # pushes/mo that's ~$9.60/mo — over the $5/mo Actions cap noted in
        # project memory. Caching .build/ keyed on Package.swift hash drops
        # subsequent runs to ~30-60s. Restore-keys ensures partial reuse
        # on the rare hash miss.
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Show Swift version
        run: swift --version

      - name: Run swift test and capture count
        id: swift_test
        # GitHub Actions sets `set -e` implicitly on bash run blocks; we add
        # `set -o pipefail` so `swift test | tee` correctly fails when swift
        # test exits non-zero. Combined: `set -eo pipefail` discipline.
        run: |
          set -eo pipefail
          # Capture full output so we can both surface failures AND parse the
          # final summary line. tee preserves the live log in CI for easy
          # debugging when a test fails.
          swift test 2>&1 | tee /tmp/swift-test.log
          ACTUAL=$(grep -oE "Test run with [0-9]+ tests" /tmp/swift-test.log \
                   | head -1 \
                   | grep -oE "[0-9]+")
          if [ -z "$ACTUAL" ]; then
            echo "::error::Could not parse final test count from swift test output."
            exit 1
          fi
          echo "actual_count=$ACTUAL" >> "$GITHUB_OUTPUT"
          echo "Detected ${ACTUAL} tests."

      - name: Verify PHASES.md + MANIFEST.md cite the same count
        run: |
          ./scripts/check-doc-test-counts.sh --count "${{ steps.swift_test.outputs.actual_count }}"
